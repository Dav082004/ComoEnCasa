# Configuración optimizada para producción
# Hibernate - Configuración silenciosa
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Logging limpio para producción
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.comoencasa_backend=INFO
logging.level.org.apache.commons=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.boot.autoconfigure=WARN

# Desactivar banner de Spring Boot
spring.main.banner-mode=off

# Compresión de respuesta
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Configuración de conexión a BD optimizada
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
