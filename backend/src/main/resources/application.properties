# Puerto del servidor
server.port=8081

# Deshabilitar seguridad básica (ya que estamos usando nuestra propia configuración)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Configuración de MySQL - Versión Ultra Robusta
spring.datasource.url=jdbc:mysql://localhost:3306/comoencasa_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&autoReconnect=true&useUnicode=true&characterEncoding=UTF-8&failOverReadOnly=false&maxReconnects=10&initialTimeout=1&connectTimeout=60000&socketTimeout=300000&tcpKeepAlive=true&tcpNoDelay=true&useCompression=true&cachePrepStmts=true&useServerPrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useLocalSessionState=true&elideSetAutoCommits=true&alwaysSendSetIsolation=false&enableQueryTimeouts=false
spring.datasource.username=root
spring.datasource.password=

# Configuración del pool de conexiones HikariCP - Corregida
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.auto-commit=false

# Configuración de Hibernate - Actualizada para eliminar warnings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Configuraciones adicionales para estabilidad de conexión - Corregidas
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.connection.autocommit=false
spring.jpa.properties.hibernate.current_session_context_class=thread

# Logging optimizado para producción
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=INFO
logging.level.com.comoencasa_backend=DEBUG
logging.level.org.apache.commons=WARN
logging.level.org.hibernate.SQL=WARN

