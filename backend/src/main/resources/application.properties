# Puerto del servidor
server.port=8081

# Deshabilitar seguridad básica (ya que estamos usando nuestra propia configuración)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Configuración de MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/comoencasa_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Configuración de Hibernate - Actualizada para eliminar warnings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Logging optimizado para producción
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.comoencasa_backend=INFO
logging.level.org.apache.commons=WARN
logging.level.org.hibernate.SQL=WARN

