# Puerto del servidor
server.port=8081

# Deshabilitar seguridad básica (ya que estamos usando nuestra propia configuración)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Configuración de MySQL - Versión Ultra Robusta
spring.datasource.url=jdbc:mysql://localhost:3306/comoencasa_db
spring.datasource.username=root
spring.datasource.password=root

# Configuración del pool de conexiones HikariCP - Corregida
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.auto-commit=false

# Configuración de Hibernate - Actualizada para eliminar warnings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Configuraciones adicionales para estabilidad de conexión - Corregidas
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.connection.autocommit=false
spring.jpa.properties.hibernate.current_session_context_class=thread

# 📊 CONFIGURACIÓN AVANZADA DE LOGGING
logging.level.com.comoencasa_backend=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.apache.commons=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=DEBUG

# 📁 Configuración de archivos de log
logging.file.name=logs/comoencasa-app.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.file.total-size-cap=500MB

# 🎯 Patrón de logging para archivos
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n

# 🔄 Configuración de rolling
logging.logback.rollingpolicy.file-name-pattern=logs/archived/comoencasa-app-%d{yyyy-MM-dd}.%i.log.gz
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=500MB

