<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="cakeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb3d1"/>
      <stop offset="100%" style="stop-color:#ff69b4"/>
    </linearGradient>
    <linearGradient id="frostingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f8ff"/>
    </linearGradient>
  </defs>
  
  <!-- Base del pastel -->
  <ellipse cx="32" cy="52" rx="24" ry="6" fill="#8b4513"/>
  
  <!-- Capa inferior -->
  <rect x="8" y="42" width="48" height="16" rx="4" fill="url(#cakeGradient)"/>
  
  <!-- Capa superior -->
  <rect x="12" y="32" width="40" height="14" rx="3" fill="url(#cakeGradient)"/>
  
  <!-- Cobertura -->
  <path d="M12,32 Q20,28 32,30 Q44,28 52,32 L52,36 Q44,34 32,36 Q20,34 12,36 Z" fill="url(#frostingGradient)"/>
  
  <!-- Cereza -->
  <circle cx="32" cy="28" r="3" fill="#dc143c"/>
  <ellipse cx="31" cy="27" rx="1" ry="0.5" fill="#ff6b85"/>
  
  <!-- Vela -->
  <rect x="31" y="20" width="2" height="8" fill="#ffd700"/>
  
  <!-- Llama -->
  <ellipse cx="32" cy="18" rx="1.5" ry="3" fill="#ff4500"/>
  <ellipse cx="32" cy="17" rx="1" ry="2" fill="#ff6347"/>
  <ellipse cx="32" cy="16" rx="0.5" ry="1" fill="#ffff00"/>
</svg>
